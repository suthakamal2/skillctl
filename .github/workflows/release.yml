name: release

on:
  push:
    tags:
      - "skillctl-v*"

jobs:
  build:
    name: build distribution
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Extract version from tag
        id: version
        run: |
          # Tag is skillctl-vX.Y.Z; emit just X.Y.Z
          VERSION="${GITHUB_REF_NAME#skillctl-v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing skillctl $VERSION"

      - name: Verify pyproject version matches tag
        run: |
          PYPROJECT_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$PYPROJECT_VERSION" != "${{ steps.version.outputs.version }}" ]; then
            echo "Tag (${{ steps.version.outputs.version }}) does not match pyproject.toml version ($PYPROJECT_VERSION)" >&2
            exit 1
          fi

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Verify with twine
        run: twine check dist/*

      - name: Upload built distribution
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: publish to PyPI
    needs: build
    # Only attempt a PyPI publish once trusted publishing is configured on PyPI
    # for this repo (set repo variable PYPI_TRUSTED_PUBLISHER=true then). Until
    # then the job is skipped rather than failing the whole release — cutting a
    # provenance tag for a hand-published version must not require PyPI OIDC.
    if: ${{ vars.PYPI_TRUSTED_PUBLISHER == 'true' }}
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download built distribution
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI (OIDC trusted publisher)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          # Idempotent: re-tagging an already-published version skips the upload
          # instead of hard-failing the run.
          skip-existing: true

  github-release:
    name: create GitHub Release
    # Depends on build only, so the GitHub Release is always cut from the built
    # artifact even when the PyPI publish is skipped (unconfigured) or already
    # published. PyPI publishing is an independent, gated job above.
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download built distribution
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Extract release notes from CHANGELOG.md
        id: notes
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          # Carve the section between `## [VERSION]` and the next `## [`.
          awk -v v="$VERSION" '
            $0 ~ "^## \\["v"\\]" {found=1; next}
            found && /^## \[/ {exit}
            found {print}
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "No CHANGELOG entry found for $VERSION" >&2
            exit 1
          fi
          {
            echo 'notes<<EOF'
            cat release-notes.md
            echo
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: skillctl ${{ needs.build.outputs.version }}
          body: ${{ steps.notes.outputs.notes }}
          files: dist/*
          draft: false
          prerelease: false
